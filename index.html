<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>墨韵 · 水墨画绘制</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 画廊 ── -->
<section id="view-gallery" class="view">
  <div class="gallery-inner">
    <div class="gallery-body">
      <div id="gallery-grid" class="gallery-grid">
        <div id="btn-new" class="new-card" title="新建画卷">
          <span class="new-plus">＋</span>
          <span class="new-text">新建画卷</span>
        </div>
      </div>
      <p id="gallery-empty" class="gallery-empty hidden">画廊空空 ， 研墨以待 。</p>
    </div>
    <aside class="brand">
      <h1 class="brand-title">墨韵</h1>
      <div class="brand-seal">墨</div>
    </aside>
  </div>
  <footer class="gallery-foot">留白处 ， 皆是画</footer>
</section>

<!-- ── 绘制 ── -->
<section id="view-paint" class="view hidden">
  <aside id="toolbar"></aside>
  <main id="stage">
    <aside id="tools-left" class="canvas-tools"></aside>
    <div class="canvas-wrap">
      <canvas id="paper" width="1000" height="1390"></canvas>
    </div>
    <aside id="tools-right" class="canvas-tools"></aside>
  </main>
  <aside id="title-aside" class="title-aside">
    <div class="work-title-wrap">
      <input id="work-title" class="work-title" maxlength="10" spellcheck="false" autocomplete="off">
      <div class="title-seal">韵</div>
    </div>
  </aside>
  <!-- 移动端抽屉把手（桌面隐藏） -->
  <button id="handle-left" class="drawer-handle">笔墨</button>
  <button id="handle-right" class="drawer-handle">纸印</button>
  <button id="handle-actions" class="drawer-handle">功能</button>
</section>

<!-- 题款 -->
<div id="inscribe-modal" class="modal hidden">
  <div class="modal-card modal-card-wide">
    <h3>题款</h3>
    <label>题词（以空格分列，竖排自右而左；简体自动转繁）
      <input id="ins-text" maxlength="40" spellcheck="false" autocomplete="off" placeholder="兴来每独往 胜事空自知">
    </label>
    <div class="modal-field">
      <span class="field-label">字体</span>
      <div class="chip-row" id="ins-font-chips">
        <button type="button" class="chip sel" data-font="brush">行楷</button>
        <button type="button" class="chip" data-font="kai">楷体</button>
        <button type="button" class="chip" data-font="song">宋体</button>
        <button type="button" class="chip" data-font="light">细宋</button>
        <button type="button" class="chip" data-font="bold">粗宋</button>
        <button type="button" class="chip" data-font="cao">草书</button>
        <button type="button" class="chip" data-font="li">隶意</button>
      </div>
    </div>
    <div class="modal-field">
      <span class="field-label">大小</span>
      <div class="chip-row" id="ins-size-chips">
        <button type="button" class="chip" data-size="sm">小</button>
        <button type="button" class="chip sel" data-size="md">中</button>
        <button type="button" class="chip" data-size="lg">大</button>
      </div>
    </div>
    <div class="modal-actions">
      <button id="ins-cancel">作罢</button>
      <button id="ins-ok">落款</button>
    </div>
  </div>
</div>

<!-- 钤印 -->
<div id="seal-modal" class="modal hidden">
  <div class="modal-card modal-card-wide">
    <h3>钤印</h3>
    <label>印文（一至四字；简体自动转繁）
      <input id="seal-text" maxlength="4" spellcheck="false" autocomplete="off" placeholder="墨韵">
    </label>
    <div class="modal-field">
      <span class="field-label">印式</span>
      <div class="chip-row" id="seal-carve-chips">
        <button type="button" class="chip sel" data-carve="yin">阴刻</button>
        <button type="button" class="chip" data-carve="yang">阳刻</button>
      </div>
    </div>
    <div class="modal-field">
      <span class="field-label">字体</span>
      <div class="chip-row" id="seal-font-chips">
        <button type="button" class="chip sel" data-font="brush">篆意</button>
        <button type="button" class="chip" data-font="kai">楷体</button>
        <button type="button" class="chip" data-font="song">宋体</button>
        <button type="button" class="chip" data-font="bold">方劲</button>
      </div>
    </div>
    <div class="modal-field">
      <span class="field-label">大小</span>
      <div class="chip-row" id="seal-size-chips">
        <button type="button" class="chip" data-size="sm">小</button>
        <button type="button" class="chip sel" data-size="md">中</button>
        <button type="button" class="chip" data-size="lg">大</button>
      </div>
    </div>
    <div class="seal-preview-wrap">
      <canvas id="seal-preview" width="96" height="96"></canvas>
    </div>
    <div class="modal-actions">
      <button id="seal-cancel">作罢</button>
      <button id="seal-ok">钤印</button>
    </div>
  </div>
</div>

<div id="cursor-ring"></div>
<div id="toast"></div>

<script src="s2t.js"></script>
<script src="app.js"></script>
</body>
</html>
